  <style>
    /* Reduce excessive padding and set a comfortable max-width for main content */
    :root {
      --content-max-width: 1000px;
      --content-padding: 1.5rem 1rem;
      --sidebar-width: 20vw;
      --theme-color: #81a1c1;
      --base-background-color: #2e3440;
      --base-color: #eceff4;
      --sidebar-background: #2e3440;
      --sidebar-name-color: #eceff4;
      --sidebar-nav-link-color: #eceff4;
      --sidebar-nav-link-color--active: #81a1c1;
      --sidebar-nav-link-border-color--active: #81a1c1;
      --search-input-background-color: #3b4252;
      --search-input-color: #eceff4;
      --search-result-keyword-background: #434c5e;
      --search-result-keyword-color: #eceff4;
    }
    
    @media screen and (min-width: 1000px) {
      :root {
        --content-padding: 2.5rem 3rem;
      }
    }

    /* Add a YouTube icon on top of all YouTube links with images */
    a[href*="youtu"]:has(img[src*="ytimg"]) {
      position: relative;
      display: inline-block;
    }

    a[href*="youtu"]:has(img[src*="ytimg"])::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 100px;
      height: 100px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="red" class="bi bi-youtube" viewBox="0 0 16 16"><path d="M8.051 1.999h.089c.822.003 4.987.033 6.11.335a2.01 2.01 0 0 1 1.415 1.42c.101.38.172.883.22 1.402l.01.104.022.26.008.104c.065.914.073 1.77.074 1.957v.075c-.001.194-.01 1.108-.082 2.06l-.008.105-.009.104c-.05.572-.124 1.14-.235 1.558a2.01 2.01 0 0 1-1.415 1.42c-1.16.312-5.569.334-6.18.335h-.142c-.309 0-1.587-.006-2.927-.052l-.17-.006-.087-.004-.171-.007-.171-.007c-1.11-.049-2.167-.128-2.654-.26a2.01 2.01 0 0 1-1.415-1.419c-.111-.417-.185-.986-.235-1.558L.09 9.82l-.008-.104A31 31 0 0 1 0 7.68v-.123c.002-.215.01-.958.064-1.778l.007-.103.003-.052.008-.104.022-.26.01-.104c.048-.519.119-1.023.22-1.402a2.01 2.01 0 0 1 1.415-1.42c.487-.13 1.544-.21 2.654-.26l.17-.007.172-.006.086-.003.171-.007A100 100 0 0 1 7.858 2z"/><path d="M6.4 5.209v4.818l4.157-2.408z" fill="white"/></svg>') no-repeat center center;
      background-size: contain;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    summary {
      cursor: pointer;
    }

    body {
      background: #2e3440;
      color: #eceff4;
    }

    .sidebar-nav .tds-week,
    .sidebar nav .tds-week {
      margin: 0.55rem 0;
      border-bottom: 1px solid var(--mono-tint2, #e5e7eb);
      padding-bottom: 0.4rem;
    }

    .sidebar-nav .tds-week summary,
    .sidebar nav .tds-week summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      font-weight: 600;
      line-height: 1.35;
      list-style: none;
    }

    .sidebar-nav .tds-week summary::-webkit-details-marker,
    .sidebar nav .tds-week summary::-webkit-details-marker {
      display: none;
    }

    .sidebar-nav .tds-week summary::after,
    .sidebar nav .tds-week summary::after {
      content: "+";
      color: var(--theme-color, #dc3545);
      font-weight: 700;
    }

    .sidebar-nav .tds-week[open] summary::after,
    .sidebar nav .tds-week[open] summary::after {
      content: "-";
    }

    .sidebar-nav .tds-week ul,
    .sidebar nav .tds-week ul {
      border-left: 2px solid var(--mono-tint2, #e5e7eb);
      margin: 0.6rem 0 0 0.15rem;
      padding-left: 0.85rem;
    }

    .sidebar-nav .tds-week li,
    .sidebar nav .tds-week li {
      margin: 0.35rem 0;
    }

    @media screen and (max-width: 768px) {
      :root {
        --sidebar-width: 82vw;
      }
    }

    .open.folder.level-1 {
      margin-bottom: 2rem;
    }

    .sidebar-nav ul>li>span,
    .sidebar-nav ul>li>strong,
    .sidebar nav ul>li>span,
    .sidebar nav ul>li>strong {
      margin: var(--sidebar-nav-pagelink-padding, var(--sidebar-nav-link-padding));
      margin-top: 0.5rem;
    }

    .sidebar-nav ul>li:first-child>span,
    .sidebar-nav ul>li:first-child>strong,
    .sidebar nav ul>li:first-child>span,
    .sidebar nav ul>li:first-child>strong {
      margin-top: 0.5rem;
    }

    /* Sidebar resizer handle */
    .sidebar-resizer {
      width: 6px;
      height: 100%;
      position: absolute;
      right: -3px;
      top: 0;
      cursor: col-resize;
      z-index: 9999;
      background-color: transparent;
      transition: background-color 0.2s;
    }

    .sidebar-resizer:hover,
    .sidebar-resizer.resizing {
      background-color: rgba(220, 53, 69, 0.4) !important;
    }

    /* Disable transitions during active drag resizing to make it feel buttery smooth */
    body.is-resizing .sidebar,
    body.is-resizing .content {
      transition: none !important;
    }

    /* Sleek premium scrollbar for the sidebar */
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    /* Dark mode scrollbar support */
    @media (prefers-color-scheme: dark) {
      .sidebar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
      }

      .sidebar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script src="legacy/legacy-pages.js"></script>
  <script>
    const legacyAlias = {};
    const legacyTerms = ['2025-01', '2025-05', '2025-09', '2026-01', '2026-02', '2026-05'];
    (window.tdsLegacyPages || []).forEach((page) => {
      const target = `/legacy/2025-content/${page}.md`;
      legacyAlias[`/${page}`] = target;
      legacyAlias[`/${page}.md`] = target;
      legacyTerms.forEach((term) => {
        legacyAlias[`/${term}/${page}`] = target;
        legacyAlias[`/${term}/${page}.md`] = target;
      });
    });

    function resizableSidebar(hook, vm) {
      hook.doneEach(() => {
        const sidebar = document.querySelector('.sidebar');
        if (!sidebar || sidebar.querySelector('.sidebar-resizer')) return;

        const resizer = document.createElement('div');
        resizer.className = 'sidebar-resizer';
        sidebar.appendChild(resizer);

        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
          isResizing = true;
          resizer.classList.add('resizing');
          document.body.classList.add('is-resizing');
          document.body.style.cursor = 'col-resize';
          document.body.style.userSelect = 'none';
          e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
          if (!isResizing) return;
          const newWidth = e.clientX;
          if (newWidth > 200 && newWidth < 600) {
            document.documentElement.style.setProperty('--sidebar-width', `${newWidth}px`);
          }
        });

        document.addEventListener('mouseup', () => {
          if (isResizing) {
            isResizing = false;
            resizer.classList.remove('resizing');
            document.body.classList.remove('is-resizing');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
          }
        });
      });
    }

    function persistSidebarDetails(hook, vm) {
      const storageKey = 'tds-sidebar-week-state';

      const readState = () => {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || '{}');
        } catch (e) {
          return {};
        }
      };

      const keyFor = (detail) => detail.querySelector('summary')?.textContent?.trim() || '';

      const applySidebarState = () => {
        const details = [...document.querySelectorAll('.sidebar details.tds-week')];
        const state = readState();

        details.forEach((detail) => {
          const key = keyFor(detail);
          if (Object.prototype.hasOwnProperty.call(state, key)) detail.open = !!state[key];
        });

        const active = document.querySelector('.sidebar a.active, .sidebar a[aria-current="page"]');
        const activeParent = active?.closest('details.tds-week');
        if (activeParent) activeParent.open = true;

        const writeState = () => {
          const next = {};
          details.forEach((detail) => {
            const key = keyFor(detail);
            if (key) next[key] = detail.open;
          });
          localStorage.setItem(storageKey, JSON.stringify(next));
        };

        details.forEach((detail) => detail.addEventListener('toggle', writeState));
        document.querySelectorAll('.sidebar a[href]').forEach((link) => link.addEventListener('click', writeState));
        writeState();
      };

      hook.doneEach(() => {
        setTimeout(applySidebarState, 0);
      });
    }

    window.$docsify = {
      name: 'Tools in Data Science',
      subMaxLevel: 1,
      themeColor: '#81a1c1',
      loadSidebar: true,
      alias: legacyAlias,
      sidebarDisplayLevel: 1,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search',
        noData: 'No results',
        depth: 3
      },
      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        resizableSidebar,
        persistSidebarDetails
      ]
    };

  </script>
