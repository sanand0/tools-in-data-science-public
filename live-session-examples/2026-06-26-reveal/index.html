<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Reveal Sample</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/white.css">
  <style>.annotation{position:absolute;right:1rem;bottom:1rem;background:#fff3cd;border:1px solid #f0c36d;padding:.6rem;font-size:.45em}</style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section>
        <h1>Reveal Live Session</h1>
        <p>Press F for fullscreen or use the portal fullscreen button.</p>
        <p class="annotation">Annotation: visible on the slide.</p>
        <aside class="notes">Speaker note: explain the portal renderer.</aside>
      </section>
      <section>
        <h2>Export</h2>
        <p>Use the Export PDF link to open the print layout.</p>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>
  <script>Reveal.initialize({ hash: true, plugins: [RevealNotes] });</script>
</body>
</html>
